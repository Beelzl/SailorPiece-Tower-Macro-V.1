<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=11" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 300px;
      height: 240px;
      overflow: hidden;
      font-family: Arial, sans-serif;
      background: #f5e6f0;
    }

    .app {
      width: 300px;
      height: 240px;
      position: relative;
      border-radius: 14px;
      overflow: hidden;
    }

    .bg {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-image: url('Background_handle.jpg');
      background-size: cover;
      background-position: center;
      opacity: 0.55;
    }

    .glass {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(255,255,255,0.45);
      pointer-events: none;
    }

    /* ── Header ── */
    .header {
      position: relative;
      z-index: 1;
      width: 300px;
      height: 38px;
      padding: 0 12px;
      border-bottom: 1px solid rgba(255,182,213,0.5);
      background: rgba(255,220,235,0.45);
      cursor: move;
      -ms-user-select: none;
      user-select: none;
      display: -ms-flexbox;
      display: flex;
      -ms-flex-align: center;
      align-items: center;
      -ms-flex-pack: justify;
      justify-content: space-between;
    }

    .header-left {
      display: -ms-flexbox;
      display: flex;
      -ms-flex-align: center;
      align-items: center;
    }

    .logo {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      background: linear-gradient(135deg, #f6339a, #ff8cc8);
      text-align: center;
      line-height: 22px;
      font-size: 12px;
      margin-right: 8px;
      -ms-flex-negative: 0;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(246,51,154,0.35);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .title {
      color: #c2185b;
      font-size: 12px;
      font-weight: 700;
      display: block;
      line-height: 1.3;
    }

    .subtitle {
      color: #e91e8c;
      font-size: 9px;
      display: block;
      line-height: 1.2;
    }

    .header-right {
      display: -ms-flexbox;
      display: flex;
      -ms-flex-align: center;
      align-items: center;
      margin-right: 4px;
    }

    .badge {
      background: rgba(246,51,154,0.1);
      border: 1px solid rgba(246,51,154,0.25);
      color: #e0559a;
      font-size: 8px;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 10px;
      margin-right: 7px;
    }

    .close-btn {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: rgba(246,51,154,0.12);
      border: 1px solid rgba(246,51,154,0.3);
      color: #e0559a;
      font-size: 9px;
      font-weight: 700;
      cursor: pointer;
      text-align: center;
      line-height: 14px;
    }

    .close-btn:hover {
      background: rgba(246,51,154,0.28);
    }

    /* ── Body ── */
    .body {
      position: relative;
      z-index: 1;
      padding: 10px 12px 10px 12px;
    }

    /* ── Card ── */
    .card {
      background: rgba(255,220,235,0.45);
      border: 1px solid rgba(255,182,213,0.6);
      border-radius: 10px;
      padding: 8px 10px 9px 10px;
      box-shadow: 0 4px 16px rgba(246,51,154,0.08), inset 0 1px 0 rgba(255,255,255,0.9);
    }

    .card-top {
      display: -ms-flexbox;
      display: flex;
      -ms-flex-align: center;
      align-items: center;
      -ms-flex-pack: justify;
      justify-content: space-between;
    }

    .card-label {
      color: #c2185b;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .status-pill {
      display: -ms-flexbox;
      display: flex;
      -ms-flex-align: center;
      align-items: center;
      background: rgba(220,50,100,0.08);
      border: 1px solid rgba(220,50,100,0.22);
      border-radius: 20px;
      padding: 2px 8px 2px 6px;
    }

    .status-pill.running {
      background: rgba(0,180,100,0.1);
      border-color: rgba(0,180,100,0.28);
    }

    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #e05580;
      margin-right: 5px;
      box-shadow: 0 0 4px rgba(220,50,100,0.5);
    }

    .dot.running {
      background: #00c878;
      box-shadow: 0 0 4px rgba(0,180,100,0.5);
      animation: pulse 1.4s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.25; }
    }

    .status-text {
      color: #d81b60;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .status-text.running { color: #00875a; }

    .timer-value {
      color: #880e4f;
      font-size: 22px;
      font-family: Consolas, monospace;
      letter-spacing: 2px;
      margin-top: 6px;
      line-height: 1;
      cursor: default;
      display: inline-block;
      transition: transform 0.15s, color 0.15s;
    }

    .timer-sub {
      display: -ms-flexbox;
      display: flex;
      -ms-flex-pack: justify;
      justify-content: space-between;
      color: #e91e8c;
      font-size: 8px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-top: 3px;
    }

    /* ── Toggle ── */
    .toggle-row {
      display: -ms-flexbox;
      display: flex;
      -ms-flex-align: center;
      align-items: center;
      -ms-flex-pack: justify;
      justify-content: space-between;
      background: rgba(255,220,235,0.4);
      border: 1px solid rgba(255,182,213,0.55);
      border-radius: 8px;
      padding: 7px 10px;
      margin-top: 8px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
    }

    .toggle-label {
      color: #c2185b;
      font-size: 11px;
      font-weight: 600;
    }

    .toggle {
      width: 28px;
      height: 15px;
      background: rgba(246,51,154,0.1);
      border: 1px solid rgba(246,51,154,0.2);
      border-radius: 20px;
      position: relative;
      cursor: pointer;
    }

    .toggle.on {
      background: rgba(246,51,154,0.25);
      border-color: rgba(246,51,154,0.5);
    }

    .toggle-knob {
      width: 10px;
      height: 10px;
      background: #d4a0bc;
      border-radius: 50%;
      position: absolute;
      top: 2px;
      left: 2px;
      transition: left 0.18s;
    }

    .toggle.on .toggle-knob {
      left: 14px;
      background: #f6339a;
      box-shadow: 0 0 5px rgba(246,51,154,0.5);
    }

    /* ── Keybind row ── */
    .keybind-row {
      display: -ms-flexbox;
      display: flex;
      -ms-flex-pack: justify;
      justify-content: space-between;
      margin-top: 8px;
      padding: 6px 10px;
      background: rgba(255,220,235,0.4);
      border: 1px solid rgba(255,182,213,0.55);
      border-radius: 8px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
    }

    .keybind-item {
      display: -ms-flexbox;
      display: flex;
      -ms-flex-align: center;
      align-items: center;
    }

    .key {
      background: rgba(246,51,154,0.12);
      border: 1px solid rgba(246,51,154,0.3);
      border-radius: 4px;
      color: #c2185b;
      font-size: 9px;
      font-weight: 700;
      padding: 1px 5px;
      margin-right: 5px;
      letter-spacing: 0.3px;
    }

    .key-desc {
      color: #c2185b;
      font-size: 9px;
    }

    /* ── Hint ── */
    .hint {
      text-align: center;
      margin-top: 7px;
      font-size: 9px;
      color: #c2185b;
      letter-spacing: 0.3px;
    }

    /* ── Bottom bar ── */
    .bottom-bar {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 300px;
      height: 2px;
      background: linear-gradient(90deg, #f6339a, #ffaacc, #f6339a);
    }
  </style>
</head>
<body>
  <div class="app" id="app" onmousedown="onAppMouseDown(event)">
    <div class="bg" id="bg"></div>
    <canvas id="particle-canvas" style="position:absolute;top:0;left:0;pointer-events:none;z-index:0;"></canvas>
    <div class="glass" id="glass"></div>

    <div class="header" id="header" onmousedown="onHeaderMouseDown(event)">
      <div class="header-left">
        <div class="logo" id="logo">&#9889;</div>
        <div>
          <span class="title" id="title">Tower Automation</span>
          <span class="subtitle" id="subtitle">By Beelzul</span>
        </div>
      </div>
      <div class="header-right">
        <div class="badge" id="badge">v1.0</div>
        <div class="close-btn" id="close-btn" onclick="closeApp()">&#10005;</div>
      </div>
    </div>

    <div class="body">

      <div class="card" id="card">
        <div class="card-top">
          <div class="card-label" id="card-label">Status</div>
          <div class="status-pill" id="status-pill">
            <div class="dot" id="status-dot"></div>
            <div class="status-text" id="status-text">STOPPED</div>
          </div>
        </div>
        <div class="timer-value" id="timer">--:--:--</div>
        <div class="timer-sub" id="timer-sub">
          <span>Elapsed Time</span>
          <span id="clear-count" style="margin-left:10px;color:#f06292;font-weight:700;">Clear: 0</span>
        </div>
      </div>

      <div class="toggle-row" id="toggle-row">
        <div class="toggle-label" id="toggle-label">Activate Nigga Mode</div>
        <div class="toggle" id="toggle" onclick="toggleCheck()">
          <div class="toggle-knob"></div>
        </div>
      </div>

<div class="keybind-row" id="keybind-row">
        <div class="keybind-item">
          <div class="key">F8</div>
          <div class="key-desc">Toggle macro</div>
        </div>
        <div class="keybind-item">
          <div class="key">F9</div>
          <div class="key-desc">Exit app</div>
        </div>
      </div>

      <div class="hint" id="hint">Use at your own risk &mdash; stay responsible</div>

    </div>

    <div class="bottom-bar" id="bottom-bar"></div>

  </div>

  <script>
    function onAppMouseDown(e) {
      var t = e.target || e.srcElement;
      var id = t.id || "";
      var cls = t.className || "";
      if (id === "close-btn" || cls.indexOf("close-btn") !== -1) return;
      if (id === "toggle" || cls.indexOf("toggle") !== -1) return;
      window.location.href = "ahk:drag";
    }

    function onHeaderMouseDown(e) {
      var t = e.target || e.srcElement;
      if (t.className && t.className.indexOf("close-btn") !== -1) return;
      window.location.href = "ahk:drag";
    }

    function closeApp() { window.location.href = "ahk:exit"; }

    // ── Hover effects ──
    function addHover(el, overFn, outFn) {
      el.onmouseover = overFn;
      el.onmouseout  = outFn;
    }

    window.onload = function() {
      var logo  = document.getElementById("logo");
      var timer = document.getElementById("timer");

      // Logo hover
      addHover(logo,
        function() {
          logo.style.transform  = "scale(1.18) rotate(-6deg)";
          logo.style.boxShadow  = "0 4px 16px rgba(246,51,154,0.6)";
          logo.style.background = "linear-gradient(135deg,#ff69b4,#ffb6d9)";
        },
        function() {
          logo.style.transform  = "";
          logo.style.boxShadow  = "0 2px 8px rgba(246,51,154,0.35)";
          logo.style.background = "linear-gradient(135deg,#f6339a,#ff8cc8)";
        }
      );

      // Timer hover
      addHover(timer,
        function() {
          timer.style.transform = "scale(1.06)";
          timer.style.color     = "#f06292";
        },
        function() {
          timer.style.transform = "";
          timer.style.color     = "#880e4f";
        }
      );

    };

    function toggleCheck() {
      var t = document.getElementById("toggle");
      t.className = t.className === "toggle on" ? "toggle" : "toggle on";
    }

    function setStatus(state) {
      var text = document.getElementById("status-text");
      var dot  = document.getElementById("status-dot");
      var pill = document.getElementById("status-pill");
      if (state === "running") {
        text.innerText = "RUNNING";
        text.className = "status-text running";
        dot.className  = "dot running";
        pill.className = "status-pill running";
        document.getElementById("timer").innerText = "00:00:00";
      } else {
        text.innerText = "STOPPED";
        text.className = "status-text";
        dot.className  = "dot";
        pill.className = "status-pill";
        document.getElementById("timer").innerText = "--:--:--";
        document.getElementById("clear-count").innerText = "Clear: 0";
      }
    }

    function startMacro() { setStatus("running"); window.location.href = "ahk:start"; }
    function stopMacro()  { setStatus("stopped"); window.location.href = "ahk:stop";  }
  </script>
  <script src="Tower-Automation.js"></script>
</body>
</html>
